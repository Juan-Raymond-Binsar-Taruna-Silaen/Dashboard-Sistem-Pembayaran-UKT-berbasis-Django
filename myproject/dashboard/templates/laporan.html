<!DOCTYPE html>
<html>
<head>
    <title>Laporan UKT</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Inter',sans-serif;
        }

        body{
            display:flex;
            background:#f4f7fc;
            font-weight:400;
            overflow-x:hidden;
        }

        .sidebar{
            width:260px;
            height:100vh;
            background:linear-gradient(180deg,#6C63FF,#5146e5);
            color:white;
            padding:25px;
            position:fixed;
        }

        .sidebar h2{
            margin-bottom:40px;
            text-align:center;
            font-weight:600;
        }

        .menu{
            display:block;
            color:white;
            text-decoration:none;
            padding:15px;
            margin-bottom:10px;
            border-radius:12px;
            transition:.3s;
        }

        .menu:hover{
            background:rgba(255,255,255,.2);
        }

        .menu.active{
            background:rgba(255,255,255,.25);
            font-weight:bold;
        }

        .menu i{
            margin-right:10px;
        }

        .content{
            flex:1;
            margin-left:260px;
            padding:30px;
            min-width:0;
            max-width:calc(100vw - 260px);
        }

        .page-title{
            margin-bottom:25px;
        }

        .page-title h1{
            font-size:22px;
            font-weight:600;
            color:#333;
        }   

        .page-title span{
            font-size:13px;
            color:#999;
        }

    
        .cards{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
            gap:20px;
            margin-bottom:25px;
        }

        .card{
            background:white;
            padding:20px;
            border-radius:16px;
            box-shadow:0 4px 15px rgba(0,0,0,.08);
            border:1px solid #ececff;
        }

        .card h3{
            color:gray;
            margin-bottom:10px;
            font-size:13px;
        }

        .card h1{
            color:#333;
            font-size:28px;
        }


        .filter{
            display:flex;
            align-items:center;
            gap:12px;
            background:white;
            padding:16px 20px;
            border-radius:18px;
            box-shadow:0 4px 15px rgba(0,0,0,.06);
            margin-bottom:25px;
        }

        .filter i{
            color:#6C63FF;
            font-size:15px;
        }

        .filter input{
            flex:1;
            border:none;
            outline:none;
            font-size:15px;
            background:none;
            color:#333;
        }

        table{
            width:100%;
            border-collapse:collapse;
            background:white;
            border-radius:20px;
            overflow:hidden;
            box-shadow:0 4px 15px rgba(0,0,0,.08);
        }

        th{
            background:linear-gradient(180deg,#6C63FF,#5146e5);
            color:white;
            padding:16px;
            font-size:14px;
            font-weight:600;
        }

        td{
            padding:14px;
            text-align:center;
            border-bottom:1px solid #eee;
            font-size:14px;
        }

        tr:hover{
            background:#f8f8ff;
        }

        .btn{
            background:linear-gradient(135deg,#6C63FF,#5146e5);
            color:white;
            border:none;
            padding:10px 18px;
            border-radius:12px;
            cursor:pointer;
            font-size:13px;
            font-weight:500;
            display:inline-flex;
            align-items:center;
            gap:6px;
            transition:.3s;
            box-shadow:0 4px 12px rgba(108,99,255,.25);
            text-decoration:none;
        }

        .btn:hover{
            transform:translateY(-2px);
            box-shadow:0 8px 18px rgba(108,99,255,.35);
        }

                .table-wrap {
            overflow-x: auto;
        }

        th, td {
            padding: 10px;
            font-size: 13px;
        }

    </style>
</head>

<body>

<div class="sidebar">

    <h2>
        <i class="fas fa-wallet"></i>
        UKT System
    </h2>

    <a href="/dashboard/" class="menu">
        <i class="fas fa-chart-line"></i>
        Dashboard
    </a>

    <a href="/pembayaran/" class="menu">
        <i class="fas fa-money-check-alt"></i>
        Pembayaran
    </a>

    <a href="/mahasiswa/" class="menu">
        <i class="fas fa-user-graduate"></i>
        Mahasiswa
    </a>

    <a href="/laporan/" class="menu active">
        <i class="fas fa-file-alt"></i>
        Laporan
    </a>

    <a href="/logout/" class="menu">
        <i class="fas fa-sign-out-alt"></i>
        Logout
    </a>

</div>

<div class="content">

    <div class="page-title">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <div>
            <span>UKT System / Laporan</span>
            <h1>Laporan Pembayaran UKT</h1>
        </div>
        <button onclick="window.print()" class="btn">
            <i class="fas fa-print"></i>
            Print Laporan
        </button>
    </div>
</div>

    <!-- CARDS -->
    <div class="cards">
        <div class="card">
            <h3>Total Mahasiswa</h3>
            <h1>{{ data|length }}</h1>
        </div>
        <div class="card">
            <h3>Status Laporan</h3>
            <h1>Aktif</h1>
        </div>
    </div>

    <!-- SEARCH -->
    <div class="filter">
        <i class="fas fa-search"></i>
        <input type="text" id="searchInput" placeholder="Cari mahasiswa..." onkeyup="cariData()">
    </div>

    <!-- TABLE -->
    <table id="tabelLaporan">
        <thead>
            <tr>
                <th>Nama</th>
                <th>NIM</th>
                <th>Status</th>
                <th>Aksi</th>
            </tr>
        </thead>
        <tbody>
            {% for item in data %}
            <tr>
                <td>{{ item.mahasiswa.nama }}</td>
                <td>{{ item.mahasiswa.nim }}</td>
                <td>{{ item.status }}</td>
                <td>
                    <a href="/laporan/{{ item.id }}/" class="btn">
                        <i class="fas fa-print"></i>
                        Print
                    </a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

</div>

<script>
    function cariData(){
        let input = document.getElementById("searchInput").value.toLowerCase();
        let table = document.getElementById("tabelLaporan");
        let tr = table.getElementsByTagName("tr");

        for(let i = 1; i < tr.length; i++){
            let tdNama = tr[i].getElementsByTagName("td")[0];
            let tdNim = tr[i].getElementsByTagName("td")[1];

            if(tdNama || tdNim){
                let nama = tdNama.textContent.toLowerCase();
                let nim = tdNim.textContent.toLowerCase();

                if(nama.indexOf(input) > -1 || nim.indexOf(input) > -1){
                    tr[i].style.display = "";
                } else {
                    tr[i].style.display = "none";
                }
            }
        }
    }
</script>

</body>
</html>
